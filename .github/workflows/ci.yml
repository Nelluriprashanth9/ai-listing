name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install root deps
        run: npm ci
      - name: Install web deps
        run: cd web && npm ci
      - name: Build web
        run: cd web && npm run build
      - name: Run tests (placeholder)
        run: echo "No tests configured yet"
